<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKET REGIME NAVIGATOR // 2000-2025</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000;
    --grid: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
    --text-dim: rgba(255,255,255,0.25);
    --text-mid: rgba(255,255,255,0.55);
    --text-hi: rgba(255,255,255,0.9);
    --mono: 'Courier New', 'Lucida Console', monospace;
  }

  html { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text-hi);
    font-family: var(--mono);
    font-size: 11px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    letter-spacing: 0.03em;
  }

  /* Header */
  #header {
    flex-shrink: 0;
    height: 36px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
    background: rgba(0,0,0,0.95);
    z-index: 100;
  }

  #header .logo {
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.12em;
    color: var(--text-hi);
  }

  #header .logo span { color: #39ff14; }

  .hstat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .hstat b { color: var(--text-mid); font-weight: normal; }

  #date-display {
    margin-left: auto;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #39ff14;
    font-weight: bold;
  }

  #regime-label {
    font-size: 10px;
    padding: 2px 8px;
    border: 0.5px solid;
    letter-spacing: 0.1em;
  }

  /* Main Layout */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* Timeline Sidebar */
  #timeline-col {
    flex-shrink: 0;
    width: 70px;
    border-right: 0.5px solid var(--border);
    position: relative;
    overflow: hidden;
    cursor: ns-resize;
    user-select: none;
  }

  #timeline-track {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 0.5px;
    background: var(--border);
    top: 0;
    bottom: 0;
  }

  #timeline-years {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    transition: transform 0.05s linear;
  }

  .year-tick {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    transition: color 0.3s;
  }

  .year-tick::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 5px;
    height: 0.5px;
    background: var(--border);
  }

  .year-tick.active {
    color: #39ff14;
    font-weight: bold;
    font-size: 11px;
  }

  .year-tick.active::before {
    width: 30px;
    background: #39ff14;
    opacity: 0.6;
  }

  .year-tick.crisis { color: rgba(255,80,80,0.7); }
  .year-tick.crisis.active { color: #ff3333; }

  #cursor-line {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 0.5px;
    background: rgba(57,255,20,0.3);
    transform: translateY(-50%);
    pointer-events: none;
    z-index: 10;
  }

  #cursor-line::before {
    content: '';
    position: absolute;
    right: 0;
    top: -3px;
    width: 6px;
    height: 6px;
    background: #39ff14;
    border-radius: 50%;
    box-shadow: 0 0 6px #39ff14;
  }

  /* Graph Container */
  #graph-col {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #graph-col::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 20;
  }

  #graph-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Right Metrics Panel */
  #right-panel {
    flex-shrink: 0;
    width: 200px;
    border-left: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .rpanel-section {
    padding: 12px;
    border-bottom: 0.5px solid var(--border);
  }

  .rpanel-label {
    font-size: 8px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .asset-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    font-size: 10px;
    color: var(--text-mid);
    transition: color 0.3s;
  }

  .asset-row:hover { color: var(--text-hi); cursor: pointer; }

  .asset-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .asset-val {
    margin-left: auto;
    font-size: 9px;
    color: var(--text-dim);
  }

  #corr-top {
    flex: 1;
    overflow: hidden;
    padding: 12px;
  }

  .corr-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    font-size: 9px;
    color: var(--text-dim);
    border-bottom: 0.5px solid rgba(255,255,255,0.03);
  }

  .corr-val-pos { color: #39ff14; }
  .corr-val-neg { color: #ff4444; }

  /* Footer */
  #footer {
    flex-shrink: 0;
    height: 24px;
    border-top: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  #footer span { color: var(--text-mid); }

  /* D3 Node/Link Classes */
  .link {
    stroke-linecap: round;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .node-group { cursor: pointer; }

  .node-ring {
    fill: none;
    stroke-width: 0.5;
    opacity: 0.3;
  }

  .node-glow {
    pointer-events: none;
  }

  .node-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    font-weight: bold;
    fill: rgba(255,255,255,0.8);
    text-anchor: middle;
    letter-spacing: 0.05em;
    pointer-events: none;
  }

  .node-sub {
    font-family: 'Courier New', monospace;
    font-size: 7px;
    fill: rgba(255,255,255,0.35);
    text-anchor: middle;
    pointer-events: none;
  }

  #scroll-hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    pointer-events: none;
    z-index: 30;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.1; }
  }

  .regime-stable { color: #39ff14; border-color: rgba(57,255,20,0.4); }
  .regime-stress  { color: #ffa500; border-color: rgba(255,165,0,0.4); }
  .regime-crisis  { color: #ff3333; border-color: rgba(255,51,51,0.4); }
</style>
</head>

// --- Math & Utils ---
function getPairIndex(i, j) {
  let idx = 0;
  for (let a = 0; a < i; a++) idx += (8 - 1 - a);
  idx += (j - i - 1);
  return idx;
}

function getCorr(key, i, j) {
  if (i === j) return 1;
  const a = Math.min(i, j), b = Math.max(i, j);
  const arr = CORR_DATA[key];
  if (!arr) return 0;
  return arr[getPairIndex(a, b)];
}

function nearestKey(dateStr) {
  let best = TIMELINE_KEYS[0];
  for (const k of TIMELINE_KEYS) {
    if (k <= dateStr) best = k;
  }
  return best;
}

function monthToStr(year, month) {
  return `${year}-${String(month + 1).padStart(2, '0')}`;
}

function getRegime(corrArr) {
  if (!corrArr) return 'stable';
  const avg = corrArr.reduce((s, v) => s + Math.abs(v), 0) / corrArr.length;
  if (avg > 0.45) return 'crisis';
  if (avg > 0.3) return 'stress';
  return 'stable';
}

// --- App State ---
let currentMonthIdx = 98; // Starts at 2008-10 crash
const TOTAL_MONTHS = 26 * 12;

function idxToDate(idx) {
  const year = 2000 + Math.floor(idx / 12);
  const month = idx % 12;
  return { year, month, str: monthToStr(year, month) };
}

// --- Build UI Components ---
const timelineEl = document.getElementById('timeline-years');
const TICK_H = 40;

YEARS.forEach(y => {
  const div = document.createElement('div');
  div.className = 'year-tick' + (CRISIS_YEARS.has(y) ? ' crisis' : '');
  div.id = `tick-${y}`;
  div.textContent = y;
  timelineEl.appendChild(div);
});

function updateTimeline(year) {
  document.querySelectorAll('.year-tick').forEach(t => t.classList.remove('active'));
  const el = document.getElementById(`tick-${year}`);
  if (el) {
    el.classList.add('active');
    const colH = document.getElementById('timeline-col').clientHeight;
    const midY = colH / 2;
    const yearOff = (year - 2000) * TICK_H;
    timelineEl.style.transform = `translateY(${midY - yearOff - TICK_H / 2}px)`;
  }
}

// --- D3 Force Setup ---
const svg = d3.select('#graph-svg');
let W, H;

function resize() {
  const bbox = document.getElementById('graph-col').getBoundingClientRect();
  W = bbox.width; H = bbox.height;
  svg.attr('width', W).attr('height', H);
}
resize();
window.addEventListener('resize', () => { resize(); simulation.force('center', d3.forceCenter(W/2, H/2)); simulation.alpha(0.3).restart(); });

const nodes = ASSETS.map((a, i) => ({
  id: i, name: a, label: LABELS[i], ticker: TICKERS[i], color: COLORS[i],
  x: W/2 + (Math.cos(i/8 * 2 * Math.PI) * 180),
  y: H/2 + (Math.sin(i/8 * 2 * Math.PI) * 180)
}));

const links = [];
for (let i = 0; i < 8; i++)
  for (let j = i+1; j < 8; j++)
    links.push({ source: i, target: j, corr: 0 });

const linkGroup = svg.append('g').attr('class', 'links');
const nodeGroup = svg.append('g').attr('class', 'nodes');

  .attr('opacity', 0.9)
  .style('filter', d => `drop-shadow(0 0 4px ${d.color})`);

nodeEls.append('text')
  .attr('class', 'node-label')
  .attr('dy', -18)
  .text(d => d.label.split(' ').pop());

nodeEls.append('text')
  .attr('class', 'node-sub')
  .attr('dy', -8)
  .text(d => d.ticker);

svg.append('defs').append('filter').attr('id', 'glow')
  .append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'coloredBlur')
  .select(function() { return this.parentNode; })
  .append('feMerge').selectAll('feMergeNode')
  .data(['coloredBlur', 'SourceGraphic']).enter()
  .append('feMergeNode').attr('in', d => d);

const simulation = d3.forceSimulation(nodes)
  .force('charge', d3.forceManyBody().strength(-80))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide(30))
  .force('link', d3.forceLink(links).id(d => d.id)
    .strength(d => Math.abs(d.corr) * 0.6)
    .distance(d => {
      const c = Math.abs(d.corr);
      if (c > 0.6) return 80;
      if (c > 0.3) return 140;
      if (c > 0.1) return 200;
      return 280;
    }))
  .on('tick', () => {
    linkEls
      .attr('x1', d => Math.max(20, Math.min(W-20, d.source.x)))
      .attr('y1', d => Math.max(20, Math.min(H-20, d.source.y)))
      .attr('x2', d => Math.max(20, Math.min(W-20, d.target.x)))
      .attr('y2', d => Math.max(20, Math.min(H-20, d.target.y)));

    nodeEls.attr('transform', d =>
      `translate(${Math.max(20, Math.min(W-20, d.x))},${Math.max(20, Math.min(H-20, d.y))})`
    );
  });

simulation.alphaDecay(0.02);

// --- Right Panel Setup ---
const assetListEl = document.getElementById('asset-list');
nodes.forEach(n => {
  const row = document.createElement('div');
  row.className = 'asset-row';
  row.id = `arow-${n.id}`;
  row.innerHTML = `<span class="asset-dot" style="background:${n.color};box-shadow:0 0 4px ${n.color}"></span>
    <span>${n.label}</span>
    <span class="asset-val" id="aval-${n.id}">-</span>`;
  assetListEl.appendChild(row);
});

// --- Core Update Loop ---
function update(monthIdx) {
  const { year, month, str } = idxToDate(monthIdx);
  const key = nearestKey(str);
  const corrArr = CORR_DATA[key] || CORR_DATA[TIMELINE_KEYS[0]];

  document.getElementById('date-display').textContent = key;
  updateTimeline(year);

  const regime = getRegime(corrArr);
  const regEl = document.getElementById('regime-label');
  regEl.className = 'regime-label';
  if (regime === 'crisis') {
    regEl.textContent = 'SYSTEMIC SHOCK';
    regEl.classList.add('regime-crisis');
    document.body.style.boxShadow = 'inset 0 0 60px rgba(255,0,0,0.04)';
  } else if (regime === 'stress') {
    regEl.textContent = 'ELEVATED STRESS';
    regEl.classList.add('regime-stress');
    document.body.style.boxShadow = 'inset 0 0 60px rgba(255,165,0,0.03)';
  } else {
    regEl.textContent = 'STABLE';
    regEl.classList.add('regime-stable');
    document.body.style.boxShadow = 'none';
  }

  links.forEach(l => {
    const i = l.source.id !== undefined ? l.source.id : l.source;
    const j = l.target.id !== undefined ? l.target.id : l.target;
    l.corr = getCorr(key, Math.min(i,j), Math.max(i,j));
  });

  linkEls
    .attr('stroke', d => d.corr > 0 ? '#39ff14' : '#ff3333')
    .attr('stroke-width', d => Math.abs(d.corr) > 0.45 ? Math.abs(d.corr) * 3 : 0)
    .attr('opacity', d => Math.abs(d.corr) > 0.45 ? Math.abs(d.corr) * 0.7 : 0);

  ASSETS.forEach((_, i) => {
    let sum = 0;
    for (let j = 0; j < 8; j++) {
      if (j !== i) sum += Math.abs(getCorr(key, Math.min(i,j), Math.max(i,j)));
    }
    const avg = sum / 7;
    const el = document.getElementById(`aval-${i}`);
    if (el) {
      el.textContent = avg.toFixed(2);
      el.style.color = avg > 0.5 ? '#ff4444' : avg > 0.3 ? '#ffa500' : 'rgba(255,255,255,0.3)';
    }
  });

  simulation.force('link').links(links).strength(d => Math.abs(d.corr) * 0.6);
  simulation.alpha(0.5).restart();

  const pairs = [];
  for (let i = 0; i < 8; i++)
    for (let j = i+1; j < 8; j++)
      pairs.push({ i, j, c: getCorr(key, i, j) });
  pairs.sort((a, b) => Math.abs(b.c) - Math.abs(a.c));

  const corrListEl = document.getElementById('corr-list');
  corrListEl.innerHTML = '';
  pairs.slice(0, 8).forEach(p => {
    const row = document.createElement('div');
    row.className = 'corr-row';
    const cls = p.c > 0 ? 'corr-val-pos' : 'corr-val-neg';
    row.innerHTML = `<span>${LABELS[p.i].split(' ').pop()} x ${LABELS[p.j].split(' ').pop()}</span>
      <span class="${cls}">${p.c > 0 ? '+' : ''}${p.c.toFixed(2)}</span>`;
    corrListEl.appendChild(row);
  });
}

// --- Interaction Handlers ---
let scrollAccum = 0;

window.addEventListener('wheel', e => {
  e.preventDefault();
  scrollAccum += e.deltaY;
  const step = 40;
  if (Math.abs(scrollAccum) >= step) {
    const delta = Math.round(scrollAccum / step);
    scrollAccum = 0;
    currentMonthIdx = Math.max(0, Math.min(TOTAL_MONTHS - 1, currentMonthIdx + delta));
    update(currentMonthIdx);
    document.getElementById('scroll-hint').style.opacity = '0';
  }
}, { passive: false });

let isDragging = false, dragStartY = 0, dragStartIdx = 0;
const timelineCol = document.getElementById('timeline-col');

timelineCol.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartY = e.clientY;
  dragStartIdx = currentMonthIdx;
});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dy = e.clientY - dragStartY;
  const delta = -Math.round(dy / 3);
  currentMonthIdx = Math.max(0, Math.min(TOTAL_MONTHS - 1, dragStartIdx + delta));
  update(currentMonthIdx);
});

// Initialize
update(currentMonthIdx);
</script>
</body>
</html>
